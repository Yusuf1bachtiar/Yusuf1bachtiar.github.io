<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>About & Chat | Yusuf Bachtiar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="hero">
    <div class="container">
        <h1>About & Interactive Chat</h1>
        <p class="tagline">Leave a message for me!</p>
    </div>
</header>

<nav>
    <div class="container">
        <ul class="nav-links">
            <li><a href="index.html">Bio</a></li>
            <li><a href="Experience.html">Experience</a></li>
            <li><a href="Project.html">Project</a></li>
            <li><a href="Education.html">Education</a></li>
            <li><a href="Gallery.html">Gallery</a></li>
            <li><a href="About.html" class="active">About</a></li>
        </ul>
    </div>
</nav>

<main class="container">
    <section class="card">
        <h2>Guest Book</h2>
        <p>Silakan tinggalkan pesan atau kesan kamu di sini.</p>
        
        <!-- Area History Chat -->
        <div id="chat-container" style="background: #f9f9f9; padding: 20px; border-radius: 10px; height: 300px; overflow-y: auto; margin-bottom: 20px; border: 1px solid #eee;">
            <div id="chat-history"></div>
        </div>

        <!-- Form Input -->
        <div style="display: flex; gap: 10px;">
            <input type="text" id="user-name" placeholder="Nama kamu..." style="width: 30%; padding: 10px; border-radius: 5px; border: 1px solid #ddd;">
            <input type="text" id="user-msg" placeholder="Tulis pesan..." style="flex-grow: 1; padding: 10px; border-radius: 5px; border: 1px solid #ddd;">
            <button onclick="sendMessage()" style="background: #04AA6D; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer;">Kirim</button>
        </div>
        <button onclick="clearChat()" style="margin-top: 10px; background: none; border: none; color: #888; font-size: 0.8rem; cursor: pointer;">Hapus History Saya</button>
    </section>
</main>

<script src="script.js"></script>
</body>
</html>
